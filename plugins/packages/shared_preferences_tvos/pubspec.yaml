name: shared_preferences_tvos
description: tvOS implementation of the shared_preferences plugin, backed by NSUserDefaults.
version: 0.1.0
homepage: https://github.com/fluttertv/plugins/tree/main/packages/shared_preferences_tvos
repository: https://github.com/fluttertv/plugins
issue_tracker: https://github.com/fluttertv/plugins/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

flutter:
  plugin:
    implements: shared_preferences
    platforms:
      tvos:
        pluginClass: SharedPreferencesTvosPlugin
        dartPluginClass: SharedPreferencesTvos

dependencies:
  flutter:
    sdk: flutter
  shared_preferences_platform_interface: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
