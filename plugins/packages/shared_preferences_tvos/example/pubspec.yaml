name: shared_preferences_example
description: Demonstrates how to use the shared_preferences plugin on tvOS.
publish_to: none

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  # Upstream plugin from pub.dev. Vendored example code is unchanged from
  # the official flutter/packages repo; only the platform implementation
  # dependencies differ.
  shared_preferences: ^2.5.0
  # The tvOS federated implementation under test.
  shared_preferences_tvos:
    path: ../
  shared_preferences_platform_interface: ^2.4.0

dev_dependencies:
  build_runner: ^2.1.10
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
