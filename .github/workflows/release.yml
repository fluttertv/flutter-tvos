name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v1.1.0

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write   # needed to create GitHub Releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Flutter SDK
        run: |
          FLUTTER_COMMIT=$(head -n 1 bin/internal/flutter.version)
          FLUTTER_BRANCH=$(sed -n '2p' bin/internal/flutter.version)
          git clone --depth=1 https://github.com/flutter/flutter.git -b "$FLUTTER_BRANCH"
          cd flutter
          git fetch --depth=1 origin "$FLUTTER_COMMIT"
          git checkout "$FLUTTER_COMMIT"

      - name: Resolve dependencies
        run: flutter/bin/dart pub get

      - name: Run tests
        # PUB_OFFLINE=1 avoids a flaky pub.dev advisory race in Dart SDK
        # 3.11.1 (`Bad state: Attempting to send request on closed
        # client`) that `dart test` can otherwise trigger via its
        # implicit `Entrypoint.ensureUpToDate`. Deps are already cached
        # from the previous step.
        env:
          PUB_OFFLINE: "1"
        run: flutter/bin/dart test test/

      - name: Run dart analyze
        run: flutter/bin/dart analyze lib/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "flutter-tvos ${{ steps.version.outputs.version }}" \
            --notes "See [CHANGELOG.md](https://github.com/fluttertv/flutter-tvos/blob/main/CHANGELOG.md) for release notes." \
            --repo fluttertv/flutter-tvos
