name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Flutter SDK
        run: |
          FLUTTER_COMMIT=$(head -n 1 bin/internal/flutter.version)
          FLUTTER_BRANCH=$(sed -n '2p' bin/internal/flutter.version)
          git clone --depth=1 https://github.com/flutter/flutter.git -b "$FLUTTER_BRANCH"
          cd flutter
          git fetch --depth=1 origin "$FLUTTER_COMMIT"
          git checkout "$FLUTTER_COMMIT"

      - name: Run unit tests
        run: flutter/bin/dart test test/

  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Flutter SDK
        run: |
          FLUTTER_COMMIT=$(head -n 1 bin/internal/flutter.version)
          FLUTTER_BRANCH=$(sed -n '2p' bin/internal/flutter.version)
          git clone --depth=1 https://github.com/flutter/flutter.git -b "$FLUTTER_BRANCH"
          cd flutter
          git fetch --depth=1 origin "$FLUTTER_COMMIT"
          git checkout "$FLUTTER_COMMIT"

      - name: Run dart analyze
        run: flutter/bin/dart analyze lib/
